name: Daily Slam Recap

# Runs each evening during Grand Slam fortnights
on:
  schedule:
    # 20:00 UTC = after last matches of the day (accounts for late night finishes)
    - cron: '0 20 13-26 1 *'   # Australian Open (Jan)
    - cron: '0 20 25-31 5 *'   # Roland Garros start (May)
    - cron: '0 20 1-8  6 *'    # Roland Garros end (Jun)
    - cron: '0 20 30-31 6 *'   # Wimbledon start (Jun)
    - cron: '0 20 1-13  7 *'   # Wimbledon (Jul)
    - cron: '0 20 25-31 8 *'   # US Open start (Aug)
    - cron: '0 20 1-7   9 *'   # US Open end (Sep)
  workflow_dispatch:
    inputs:
      tournament:
        description: 'Tournament name'
        required: false
      dry_run:
        description: 'Dry run (no Discord message)'
        required: false
        default: 'false'

jobs:
  recap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Elo database
        uses: actions/cache@v4
        with:
          path: data/oracle.sqlite
          key: oracle-db-${{ github.run_id }}
          restore-keys: oracle-db-

      - name: Download Sackmann data (for results)
        run: |
          git clone --depth=1 https://github.com/JeffSackmann/tennis_atp data/sackmann_atp
          git clone --depth=1 https://github.com/JeffSackmann/tennis_wta data/sackmann_wta

      - name: Run daily recap
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.tournament }}" ]; then
            ARGS="$ARGS --tournament=${{ github.event.inputs.tournament }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          npx ts-node scripts/daily-recap.ts $ARGS

      - name: Save updated database
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/oracle.sqlite
          key: oracle-db-${{ github.run_id }}

